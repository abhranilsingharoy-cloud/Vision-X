<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vision X - Tactical Biometric HUD</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="hud-container">
        <!-- Main Video Area -->
        <main class="feed-section bento-panel">
            <div class="panel-header">
                <div class="header-title"><i class="fas fa-video"></i> OPTICAL FEED</div>
                <div class="header-actions">
                    <button id="btn-screenshot" class="icon-btn" disabled><i class="fas fa-camera"></i></button>
                    <button id="btn-flip-camera" class="icon-btn" disabled><i class="fas fa-sync-alt"></i></button>
                </div>
            </div>
            <div class="canvas-wrapper">
                <video id="video" autoplay playsinline muted></video>
                <canvas id="output-canvas"></canvas>
                
                <div id="target-alert-notification" class="alert-overlay hidden">
                    <div class="alert-content">
                        <i class="fas fa-exclamation-triangle"></i>
                        <span id="target-alert-text">ALERT</span>
                    </div>
                </div>
                
                <!-- HUD Crosshairs -->
                <div class="crosshair tl"></div>
                <div class="crosshair tr"></div>
                <div class="crosshair bl"></div>
                <div class="crosshair br"></div>
            </div>
        </main>

        <!-- Sidebar Dashboard -->
        <aside class="sidebar">
            <div class="bento-panel brand-panel">
                <h1>VISION <span class="accent">X</span></h1>
                <div class="status-badge" id="system-status-badge">
                    <span id="system-status-dot" class="dot"></span>
                    <span id="system-status-text">OFFLINE</span>
                </div>
            </div>

            <div class="bento-panel control-panel">
                <div class="panel-header"><i class="fas fa-terminal"></i> CORE SYSTEMS</div>
                
                <button id="btn-toggle-camera" class="action-btn primary">
                    <i class="fas fa-power-off"></i> INITIALIZE SYSTEM
                </button>

                <div class="control-group">
                    <label>OPERATIONAL MODE</label>
                    <select id="mode-selector">
                        <option value="object">GENERAL TRACKING</option>
                        <option value="fusion">FUSION TRACKING</option>
                        <option value="biometric">BIOMETRIC HUD</option>
                        <option value="drowsiness">DROWSINESS MONITOR</option>
                        <option value="ocr">DATA SCANNER (OCR)</option>
                        <option value="heatmap">PREDICTIVE HEATMAP</option>
                        <option value="security">SECURITY SENTRY</option>
                        <option value="tripwire">ANALYTICS TRIPWIRE</option>
                        <option value="privacy">PRIVACY REDACTION</option>
                        <option value="pose">POSE ESTIMATION</option>
                        <option value="focus">SMART FOCUS</option>
                        <option value="custom">CUSTOM AI TRAINING</option>
                    </select>
                </div>

                <div id="custom-ai-controls" style="display: none; border: 1px solid rgba(0, 243, 255, 0.3); padding: 10px; margin-bottom: 15px; background: rgba(0, 243, 255, 0.05);">
                    <label style="color: #00f3ff; margin-bottom: 5px; display: block;">CUSTOM CLASS NAME</label>
                    <input type="text" id="custom-class-name" placeholder="e.g. Authorized User" style="width: 100%; background: #000; color: #00f3ff; border: 1px solid #00f3ff; padding: 5px; font-family: 'JetBrains Mono'; margin-bottom: 10px;">
                    <button id="btn-train-class" class="action-btn" style="background: rgba(0, 243, 255, 0.2); width: 100%; margin-bottom: 5px; border-color: #00f3ff; font-size: 12px;"><i class="fas fa-camera"></i> CAPTURE SAMPLES</button>
                    <button id="btn-reset-custom" class="action-btn" style="background: rgba(255, 0, 60, 0.2); width: 100%; border-color: #ff003c; color: #ff003c; font-size: 12px;"><i class="fas fa-trash"></i> RESET MEMORY</button>
                </div>

                <div class="control-group">
                    <label>TARGET ALERT (OBJECT MODE)</label>
                    <select id="target-selector">
                        <option value="none">DISABLED</option>
                    </select>
                </div>

                <div class="control-group">
                    <label>TARGET SENSITIVITY (<span id="sensitivity-val">60%</span>)</label>
                    <input type="range" id="sensitivity-slider" min="10" max="99" value="60">
                </div>

                <div class="control-group">
                    <label>VOICE LINK (J.A.R.V.I.S)</label>
                    <label class="toggle-switch">
                        <input type="checkbox" id="voice-toggle">
                        <span class="slider"></span>
                    </label>
                </div>

                <div class="control-group">
                    <label>GESTURE CONTROL</label>
                    <label class="toggle-switch">
                        <input type="checkbox" id="gesture-toggle">
                        <span class="slider"></span>
                    </label>
                </div>

                <div class="control-group">
                    <label>TACTICAL SHADER</label>
                    <select id="shader-selector" class="dropdown">
                        <option value="none">DISABLED</option>
                        <option value="nightvision">NIGHT VISION (NVG)</option>
                        <option value="thermal">THERMAL IMAGING</option>
                    </select>
                </div>

                <div class="control-group">
                    <label>AUDIO FEEDBACK</label>
                    <label class="toggle-switch">
                        <input type="checkbox" id="audio-alert-toggle" checked>
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

            <div class="telemetry-grid">
                <div class="bento-panel stat-card">
                    <div class="stat-label">FRAME RATE</div>
                    <div class="stat-val"><span id="fps-counter">0</span><small>FPS</small></div>
                </div>
                <div class="bento-panel stat-card">
                    <div class="stat-label">TARGETS</div>
                    <div class="stat-val" id="object-counter">0</div>
                </div>
            </div>

            <div class="bento-panel data-panel">
                <div class="panel-header"><i class="fas fa-list"></i> LIVE DATA</div>
                <div id="live-objects-list" class="data-list">
                    <div class="placeholder">WAITING FOR DATA...</div>
                </div>
            </div>

            <div class="bento-panel log-panel">
                <div class="panel-header"><i class="fas fa-history"></i> EVENT LOG</div>
                <div id="activity-log" class="log-stream"></div>
            </div>

            <div class="dev-credit">
                Designed & Developed by <b>Abhranil Singha Roy</b>
            </div>
        </aside>
    </div>

    <audio id="alert-sound" src="https://www.soundjay.com/buttons/sounds/beep-01a.mp3" preload="auto"></audio>

    <!-- TensorFlow.js dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgpu@4.10.0/dist/tf-backend-webgpu.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>
    
    <!-- FaceMesh, Pose, and Hands Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/face-landmarks-detection"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/hand-pose-detection"></script>
    
    <!-- Tesseract OCR -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

    <!-- Depth Estimation -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/depth-estimation"></script>

    <!-- Custom AI (MobileNet & KNN) -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/knn-classifier"></script>

    <!-- App Modules -->
    <script src="js/modules/logger.js"></script>
    <script src="js/modules/voice.js"></script>
    <script src="js/modules/tracker.js"></script>
    
    <!-- AI Models -->
    <script src="js/models/hands.js"></script>
    <script src="js/models/facemesh.js"></script>
    <script src="js/models/pose.js"></script>
    <script src="js/models/depth.js"></script>
    <script src="js/models/detector.js"></script>
    <script src="js/models/ocr.js"></script>
    <script src="js/models/custom.js"></script>
    
    <!-- Core Application -->
    <script src="js/core/ui.js"></script>
    <script src="js/core/camera.js"></script>
    <script src="js/core/app.js"></script>
</body>
</html>
